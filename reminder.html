<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>BsReminder</title> <link rel="icon" type="image/x-icon" href="https://i.ibb.co/WBcSJPd/New-Project-A1-A7313.png"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> <style> @import url('https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap'); * { color: #fff; font-family: "Red Hat Display", sans-serif; margin: 0; padding: 0; } body { background: #000; -webkit-tap-highlight-color: transparent; user-select: none;overflow: hidden; scrollbar-width: none; scrollbar-color: gray transparent; } * { -webkit-tap-highlight-color: transparent; } body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; } .header { position: fixed; top: 0; left: 0; right: 0; background: #000; z-index: 100; padding: 10px; display: flex; justify-content: space-between; align-items: center; } .app-title { color: #0049ff; font-weight: 600; font-size: 25px;} .header-buttons button { background: none; border: none; cursor: pointer; padding: 0; margin: 0; } .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 13px; color: #aaa; padding: 13px 0 6px 0; position: fixed; top: 40px; left: 0; right: 0;display: none; background: #000; z-index: 99; } .calendar-container { padding-top: 140px; overflow-y: auto; height: 100vh; } .month-section { padding: 0 10px;} .month-header { font-size: 20px; font-weight: 700; padding: 30px 0 10px 0; position: sticky; top: -110px; background: #000; z-index: 90; } .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #0a0a0a; border-radius: 15px; overflow: hidden; } .day-header { background: #ffffff36; padding: 10px 4px; text-align: center; font-size: 13px; color: #888; } .day { aspect-ratio: 1; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 6px 2px; font-size: 15px; cursor: pointer; transition: all 0.2s; background: #111111; } .day:hover { background: #313131; } .day.today .day-number { background: #0040ff; color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; } .note-preview { font-size: 10px; line-height: 1.2; text-align: center; margin-top: 4px; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 10px; } .pinned { background: #ff8c0088 !important; } .goal { background: #1800ff88 !important; } /* Modals */ .modal, #notesListModal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.95); z-index: 1000;max-width: 10px; justify-content: center; align-items: center; } .modal-content, .notes-list-content { padding: 10px 20px; max-width: 340px; border-radius: 45px; width: 80%; text-align: center; } .modal-content h3 { text-align: justify; } .notes-list-content { max-width: 600px; width: 100%; padding: 60px 0; } input, button { padding: 10px; margin: 10px 0; border-radius: 9999px; border: none;width: 100%; font-size: 17px; font-weight: 500; text-align: center; } input { background: #2c2c2e; } button { background: #0008ff; font-weight: 600; } .close { font-size: 35px; cursor: pointer; float: right; position: absolute; top: 10px; right: 10px; width: 40px; height: 40px; border-radius: 50%; background: #1c1c1e; color: white; display: flex; justify-content: center; align-items: center; font-weight: 100; } .note-item { background: #1c1c1e; padding: 16px; border-radius: 16px; margin-bottom: 12px; cursor: pointer; } .empty-state { text-align: center; color: #666; padding: 60px 20px; } </style> </head> <body> <div class="header"> <div class="app-title">BsReminder</div> <div class="header-buttons"> <button onclick="toggleNotesList()"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="m480-277.46-148.61 89.84q-12.7 7.08-25.43 6.27-12.73-.81-22.8-7.88-10.08-7.08-14.93-19.27-4.84-12.19-1.23-26.12l39.31-169.69-131.38-113.92q-11.7-8.69-14.31-21.5-2.62-12.81 1.61-24.12 4.23-11.3 14.31-19.57t23.62-9.89l172.3-14.84L439.85-768q5.84-14.31 16.65-20.27 10.81-5.96 23.5-5.96t23.5 5.96q10.81 5.96 16.65 20.27l67.39 159.85 172.3 14.84q13.54 1.62 23.62 9.89 10.08 8.27 14.31 19.57 4.23 11.31 1.61 24.12-2.61 12.81-14.31 21.5L653.69-404.31 693-234.62q3.61 13.93-1.23 26.12-4.85 12.19-14.93 19.27-10.07 7.07-22.8 7.88-12.73.81-25.43-6.27L480-277.46Z"/></svg></button> </div> </div> <div class="weekdays"> <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div> <div>Thu</div><div>Fri</div><div>Sat</div> </div> <div class="calendar-container" id="calendarContainer"></div> <!-- All Notes --> <div id="notesListModal"> <div class="notes-list-content"> <div style="margin-bottom:20px;"> <h2>All Notes <span class="close" onclick="closeNotesList()">×</span></h2> </div> <div id="notesList"></div> </div> </div> <!-- Add/Edit Note --> <div id="noteModal" class="modal"> <div class="modal-content"> <span class="close" onclick="closeModal()">×</span> <h3 id="modalDate"></h3> <div id="titleField" style="display:none;"> <input type="text" id="noteTitle" placeholder="Title for pinned note" /> </div> <input type="text" id="noteText" placeholder="Write your note here..." /> <div style="display: flex; align-items: center; gap: 8px; font-size: 14px; justify-content: flex-start; "> <input type="checkbox" id="pinForever" style=" outline: none; border: none; width: 14px; height: 15px; "> <label for="pinForever">Pin to every month on this date</label> </div> <button onclick="saveNote()">Save Note</button> </div> </div> <!-- View Note --> <div id="viewModal" class="modal"> <div class="modal-content"> <span class="close" onclick="closeModal()">×</span> <h3 id="viewTitle" style="color:#0040ff;"></h3> <p id="viewText" style="font-size:16px; line-height:1.5; white-space: pre-wrap;"></p> <button onclick="editNote()" style="margin-top:20px;">Edit Note</button> </div> </div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const addButton = document.getElementById('addButton');
        const inputModal = document.getElementById('inputModal');
        const editModal = document.getElementById('editModal');
        const closeInputButton = document.getElementById('closeInputButton');
        const closeEditButton = document.getElementById('closeEditButton');
        const closeButton = document.getElementById('closeButton');
        const submitButton = document.getElementById('submitButton');
        const saveButton = document.getElementById('saveButton');
        const popupImage = document.getElementById('popupImage');
        const popupName = document.getElementById('popupName');
        const popupWork = document.getElementById('popupWork');
        const deleteButton = document.getElementById('deleteButton');
        let currentEditData = null;
        let currentPersonData = null;

        addButton.addEventListener('click', () => {
            inputModal.style.display = 'block';
        });

        closeInputButton.addEventListener('click', () => {
            inputModal.style.display = 'none';
        });

        closeEditButton.addEventListener('click', () => {
            editModal.style.display = 'none';
        });

        closeButton.addEventListener('click', () => {
            document.getElementById('modal').style.display = 'none';
        });

        submitButton.addEventListener('click', () => {
            const imageInput = document.getElementById('imageInput');
            const nameInput = document.getElementById('nameInput').value;
            const workInput = document.getElementById('workInput').value;

            if (imageInput.files.length > 0 && nameInput && workInput) {
                const reader = new FileReader();
                reader.onload = function (event) {
                    const personData = {
                        image: event.target.result,
                        name: nameInput,
                        work: workInput
                    };

                    const existingData = JSON.parse(localStorage.getItem('people')) || [];
                    existingData.push(personData);
                    localStorage.setItem('people', JSON.stringify(existingData));
                    displayImage(personData);
                    inputModal.style.display = 'none';
                };
                reader.readAsDataURL(imageInput.files[0]);
            }
        });

        function displayImage(personData) {
            const imgContainer = document.createElement('div');
            imgContainer.classList.add('image-container');
            imgContainer.style.top = Math.random() * 90 + '%';
            imgContainer.style.left = Math.random() * 90 + '%';

            const imgElement = document.createElement('img');
            imgElement.src = personData.image;
            imgContainer.appendChild(imgElement);

            const nameElement = document.createElement('div');
            nameElement.classList.add('image-name');
            nameElement.textContent = personData.name;
            imgContainer.appendChild(nameElement);

            imgContainer.addEventListener('click', () => {
                popupImage.src = personData.image;
                popupName.textContent = personData.name;
                popupWork.textContent = personData.work;
                currentPersonData = personData;
                deleteButton.style.display = 'inline-block';
                document.getElementById('modal').style.display = 'block';
            });

            const editButton = document.createElement('button');
            editButton.classList.add('edit-button');
            editButton.innerHTML = '<i class="fas fa-user-edit"></i>';
            editButton.addEventListener('click', () => {
                currentEditData = personData;
                document.getElementById('editNameInput').value = personData.name;
                document.getElementById('editWorkInput').value = personData.work;
                editModal.style.display = 'block';
            });
            imgContainer.appendChild(editButton);
            document.body.appendChild(imgContainer);
        }

        deleteButton.addEventListener('click', () => {
            if (confirm("Are you sure you want to delete this person?")) {
                let existingData = JSON.parse(localStorage.getItem('people')) || [];
                existingData = existingData.filter(person => person.image !== currentPersonData.image);
                localStorage.setItem('people', JSON.stringify(existingData));
                location.reload();
            }
        });

        saveButton.addEventListener('click', () => {
            const nameInput = document.getElementById('editNameInput').value;
            const workInput = document.getElementById('editWorkInput').value;
            const imageInput = document.getElementById('editImageInput');
            const updatedImage = currentEditData.image;

            const reader = new FileReader();
            reader.onload = function (event) {
                const updatedData = JSON.parse(localStorage.getItem('people')) || [];
                const index = updatedData.findIndex(person => person.image === currentEditData.image);
                if (index > -1) {
                    updatedData[index] = { image: event.target.result, name: nameInput, work: workInput };
                    localStorage.setItem('people', JSON.stringify(updatedData));
                    location.reload();
                }
            };

            if (imageInput.files.length > 0) {
                reader.readAsDataURL(imageInput.files[0]);
            } else {
                const updatedData = JSON.parse(localStorage.getItem('people')) || [];
                const index = updatedData.findIndex(person => person.image === currentEditData.image);
                if (index > -1) {
                    updatedData[index] = { image: updatedImage, name: nameInput, work: workInput };
                    localStorage.setItem('people', JSON.stringify(updatedData));
                    location.reload();
                }
            }

            editModal.style.display = 'none';
        });

        function loadImages() {
            const people = JSON.parse(localStorage.getItem('people')) || [];
            people.forEach(displayImage);
        }

        loadImages();
    });
</script>
</body>
</html>
